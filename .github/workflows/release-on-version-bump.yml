# When __version__ in the package changes on the default branch, creates tag vX.Y.Z
# and a GitHub Release whose notes are the matching section in CHANGELOG.md.
# Publishes via publish-pypi.yml (reusable): token-created releases do not trigger
# `release` workflow events, so we call the publish workflow explicitly when a
# release was actually created.
name: Release on version bump

on:
  push:
    branches: [main, master]
    paths:
      - "src/homey_energy_dongle_ws/__init__.py"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.create_release.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create tag and GitHub Release if version changed
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          python3 .github/scripts/create_release_on_version_bump.py --repo-root "${GITHUB_WORKSPACE}" 2>&1 | tee /tmp/release.log
          if grep -q '^Created release v' /tmp/release.log; then
            echo "created=true" >> "${GITHUB_OUTPUT}"
          else
            echo "created=false" >> "${GITHUB_OUTPUT}"
          fi

  publish-pypi:
    needs: release
    if: needs.release.outputs.created == 'true'
    uses: ./.github/workflows/publish-pypi.yml
    secrets: inherit
