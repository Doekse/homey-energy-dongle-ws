# Publishes the package to PyPI when a GitHub Release is published, when invoked
# from release-on-version-bump (GITHUB_TOKEN-created releases do not fire `release`
# workflows), or when run manually.
# Configure a PyPI trusted publisher for this workflow (GitHub OIDC).
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/homey-energy-dongle-ws/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
